name: 自动构建规则集

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  build-rulesets:
    name: 编译 sing-box 与 mihomo 规则集
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 清理历史 Actions 记录
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ">>> 正在清理历史 Actions 运行记录..."
          PAGE=1
          DELETED=0
          CURRENT_RUN="${{ github.run_id }}"
          while true; do
            IDS=$(gh api \
              "repos/${{ github.repository }}/actions/runs?per_page=100&page=${PAGE}" \
              --jq ".workflow_runs[] | select(.id != ${CURRENT_RUN}) | .id" 2>/dev/null || true)
            [ -z "$IDS" ] && break
            while IFS= read -r run_id; do
              gh api "repos/${{ github.repository }}/actions/runs/${run_id}" \
                -X DELETE --silent 2>/dev/null && DELETED=$((DELETED+1)) || true
            done <<< "$IDS"
            COUNT=$(echo "$IDS" | grep -c '[0-9]' || true)
            [ "$COUNT" -lt 100 ] && break
            PAGE=$((PAGE+1))
          done
          echo "已删除 ${DELETED} 条历史运行记录"

      - name: 缓存 ASN 数据
        uses: actions/cache@v3
        with:
          path: asn.zip
          key: asn-${{ hashFiles('**/asn.zip') }}
          restore-keys: |
            asn-

      - name: 安装 sing-box
        env:
          SING_BOX_DEB_URL: "https://github.com/SagerNet/sing-box/releases/download/v1.10.0-beta.5/sing-box_1.10.0-beta.5_linux_amd64.deb"
        run: |
          set -Eeuo pipefail
          echo ">>> 下载 sing-box..."
          wget -q -O sing-box.deb "$SING_BOX_DEB_URL"
          sudo dpkg -i sing-box.deb
          rm sing-box.deb
          sing-box version

      - name: 安装 mihomo
        run: |
          set -Eeuo pipefail
          echo ">>> 获取 mihomo 最新版本号..."
          MIHOMO_VERSION=$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name"' | sed 's/.*"tag_name": "\(.*\)".*/\1/')
          echo "mihomo 版本：${MIHOMO_VERSION}"
          wget -q -O mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          gunzip -c mihomo.gz > mihomo
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo
          rm mihomo.gz
          mihomo -v

      - name: 安装 Python 依赖
        run: |
          set -Eeuo pipefail
          python3 -m venv venv
          source venv/bin/activate
          pip3 install -q -r requirements.txt

      - name: 生成规则集
        env:
          MAXMIND_KEY: ${{ secrets.MAXMIND_KEY }}
        run: |
          set -Eeuo pipefail
          source venv/bin/activate
          python3 main.py

      - name: 编译规则集
        run: |
          bash compile.sh

      - name: 生成 README.md
        run: |
          set -Eeuo pipefail
          source venv/bin/activate
          python3 generate_readme.py

      - name: 提交并推送
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail

          SB_COUNT=$(find rules/singbox -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')
          MH_DOMAIN=$(find rules/mihomo -mindepth 2 -maxdepth 2 -name '*_domain.yaml' 2>/dev/null | wc -l | tr -d ' ')
          MH_IPCIDR=$(find rules/mihomo -mindepth 2 -maxdepth 2 -name '*_ipcidr.yaml' 2>/dev/null | wc -l | tr -d ' ')
          COMMIT_MSG="自动构建：sing-box ${SB_COUNT} 个规则集 | mihomo 域名 ${MH_DOMAIN} 个 / IP ${MH_IPCIDR} 个"

          echo "提交信息：${COMMIT_MSG}"

          rm -rf .git
          git config --global init.defaultBranch main
          git init
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "${COMMIT_MSG}"
          git remote add origin https://github-action:$GITHUB_TOKEN@github.com/milangree/rules.git
          git push origin main --force
